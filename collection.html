<section id="collection">
  <div class="collection-header">

  let quickMode = '';
  const WA_NUM = window.BUNAN_WA || '919999999999';

  // ═══ Demo products (shown while Firebase loads / as fallback)

    {
      id: 'demo1', serialNumber: 'BN-001', saleCode: 'SAR-JMD-001',
      name: 'Jamdani Silk Saree', nameBn: 'জামদানি রেশম শাড়ি',
      category: 'Saree', fabric: 'Silk', colour: 'White',
      occasion: 'Wedding', karigari: 'Jamdani', size: 'Free Size',
      description: 'An exquisite jamdani weave in pure Murshidabad silk, featuring the traditional floral motif pattern woven directly into the fabric — not printed, not embroidered, but grown in the loom over 72 hours.',

      timeTaken: '72 hours', origin: 'Murshidabad, West Bengal',

  // ═══ Load from Firebase when ready
  function loadFromFirebase() {
    if (!window.__db) {
      window.addEventListener('firebase-ready', loadFromFirebase);
      return;
    }
    import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js").then(({ collection, getDocs, query, orderBy }) => {
      const q = query(collection(window.__db, 'products'), orderBy('likes', 'desc'));
      getDocs(q).then(snapshot => {
        if (!snapshot.empty) {
          allProducts = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
          applyFilters();
        }
      }).catch(() => {
        // Firebase not configured — keep demo data
      });
    });
  }

  // ═══ Init with demo data
  allProducts = [...demoProducts];
  applyFilters();
  loadFromFirebase();

  // ═══ Apply all filters
  window.applyFilters = function() {
    const search   = document.getElementById('searchInput')?.value.toLowerCase() || '';
    const category = document.getElementById('filterCategory')?.value || '';
    const fabric   = document.getElementById('filterFabric')?.value || '';
    const occasion = document.getElementById('filterOccasion')?.value || '';
    const colour   = document.getElementById('filterColour')?.value || '';
    const karigari = document.getElementById('filterKarigari')?.value || '';
    const size     = document.getElementById('filterSize')?.value || '';

    filteredProducts = allProducts.filter(p => {
      if (quickMode === 'new' && !p.isNew) return false;
      if (quickMode === 'bestseller' && !p.isBestSeller) return false;
      if (category && p.category !== category) return false;
      if (fabric   && p.fabric   !== fabric)   return false;
      if (occasion && p.occasion !== occasion) return false;
      if (colour   && p.colour   !== colour)   return false;
      if (karigari && p.karigari !== karigari) return false;
      if (size     && p.size     !== size)     return false;
      if (search) {
        const haystack = `${p.name} ${p.nameBn} ${p.saleCode} ${p.description} ${p.fabric}`.toLowerCase();
        if (!haystack.includes(search)) return false;
      }
      return true;
    });

    sortProducts();
    renderGrid();
  };

  function sortProducts() {
    if (currentSort === 'relevance') filteredProducts.sort((a,b) => (b.likes||0) - (a.likes||0));
    else if (currentSort === 'newest') filteredProducts.sort((a,b) => (b.isNew?1:0) - (a.isNew?1:0));
    else if (currentSort === 'az') filteredProducts.sort((a,b) => a.name.localeCompare(b.name));
  }

  window.setSort = function(type, btn) {
    currentSort = type;
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    sortProducts(); renderGrid();
  };

  window.quickFilter = function(btn, mode) {
    quickMode = mode;
    document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
  };

  window.resetFilters = function() {
    ['filterCategory','filterFabric','filterOccasion','filterColour','filterKarigari','filterSize'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    const si = document.getElementById('searchInput');
    if (si) si.value = '';
    quickMode = '';
    document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
    document.querySelector('.filter-chip[data-quick=""]')?.classList.add('active');
    applyFilters();
  };

  // ═══ Expose for hero category clicks
  window.__filterCategory = function(cat) {
    document.getElementById('filterCategory').value = cat;
    quickMode = '';
    document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
    document.querySelector('.filter-chip[data-quick=""]')?.classList.add('active');
    applyFilters();
    document.getElementById('collection').scrollIntoView({ behavior: 'smooth' });
  };

  // ═══ Render grid
  function renderGrid() {
    const grid = document.getElementById('productGrid');
    const count = document.getElementById('resultsCount');
    if (!grid) return;

    if (count) count.textContent = `${filteredProducts.length} piece${filteredProducts.length !== 1 ? 's' : ''} found`;

    if (filteredProducts.length === 0) {
      grid.innerHTML = `<div class="products-empty"><p>কোনো পণ্য পাওয়া যায়নি। ফিল্টার পরিবর্তন করুন।</p></div>`;
      return;
    }

    grid.innerHTML = filteredProducts.map(p => productCard(p)).join('');
  }

  function productCard(p) {

          Enquire

    </div>`;

  // ═══ Google Drive thumbnail
  function driveThumb(url) {
    const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
    return match ? `https://drive.google.com/thumbnail?id=${match[1]}&sz=w400` : url;
  }

  // ═══ Open modal

  window.closeModal = function(e) {
    if (e && e.target !== document.getElementById('productModal')) return;
    document.getElementById('productModal').classList.remove('open');
    document.body.style.overflow = '';
  };

  // ═══ Like product
  window.likeProduct = function(id, btn) {
    const p = allProducts.find(x => x.id === id);
    if (!p) return;
    p.likes = (p.likes || 0) + 1;
    btn.classList.add('liked');
    btn.querySelector('.like-count').textContent = p.likes;

    // Persist to Firebase if available
    if (window.__db) {
      import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js")
        .then(({ doc, updateDoc, increment }) => {
          updateDoc(doc(window.__db, 'products', id), { likes: increment(1) }).catch(() => {});
        });
    }
  };
})();
</script>
